{% extends 'layout.html' %}
{% block body %}



<div class="postsubmit">
	Enter your post here:<br>
	<div class="postinginfo">
	You are posting to {{ subforum.title }}
	</div>

	<form action="action_post?sub={{ subforum.id }}" method="POST" enctype="multipart/form-data">

		<input class="inputbox" size="100" type="text" placeholder="Title" name="title"><br>

		<label for="visibility">Visibility</label><br>
		<select class="inputbox" name="visibility" id="visibility">
			<option value="public" {% if default_visibility != 'private' %}selected{% endif %}>Public</option>
			<option value="private" {% if default_visibility == 'private' %}selected{% endif %}>Private</option>
		</select><br>

		<textarea class="inputbox" rows="25" cols="100"  name="content" placeholder="Enter post here"></textarea><br>

		<label for="upload_file">Attachment</label><br>
		<input class="inputbox" type="file" id="upload_file" name="upload_file" accept="image/*,video/*"><br>
		<input class="inputbox" type="submit" value="Submit Post">
	</form>
</div>
{% endblock %}
