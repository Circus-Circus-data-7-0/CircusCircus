<a href="/" id="nolinks"><b>{{ config.SITE_NAME }}</b></a>{% if config.SITE_DESCRIPTION %} - {% endif %} <i>{{ config.SITE_DESCRIPTION }}</i>
<div class="login">
	{% if current_user.is_authenticated %}
	<b class="{% if current_user.admin %}adminusername{% endif %}">{{ current_user.username }}</b>
	<a class="logoutlink" href="/action_logout">(logout)</a>
	<a class="logoutlink" href="/messages">(messages)</a>
	{% else %}
	<a href="/loginform">Click here to login or register!</a>
	{% endif %}
</div>
