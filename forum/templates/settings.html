{% extends 'layout.html' %}
{% block body %}

<div class="loginbox">
	<h3>Settings</h3>
	<form action="/settings" method="POST">
		<label>Profile visibility</label><br>
		<select class="loginelement" name="profile_visibility">
			<option value="public" {% if settings.profile_visibility == 'public' %}selected{% endif %}>Public</option>
			<option value="private" {% if settings.profile_visibility == 'private' %}selected{% endif %}>Private</option>
		</select><br>

		<label>Default post visibility</label><br>
		<select class="loginelement" name="post_visibility">
			<option value="public" {% if settings.post_visibility == 'public' %}selected{% endif %}>Public</option>
			<option value="private" {% if settings.post_visibility == 'private' %}selected{% endif %}>Private</option>
		</select><br>

		<label>
			<input type="checkbox" name="show_email" {% if settings.show_email %}checked{% endif %}>
			Show my email on my profile
		</label><br>

		<label>
			<input type="checkbox" name="allow_messages" {% if settings.allow_messages %}checked{% endif %}>
			Allow direct messages
		</label><br>

		<input class="loginelement" type="submit" value="Save Settings">
	</form>
</div>

{% endblock %}
